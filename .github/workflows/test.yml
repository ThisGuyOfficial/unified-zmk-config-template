name: test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-left:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build Left Half

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config directory
        run: |
          mkdir -p config
          echo "📁 Config directory contents:"
          ls -la config/ || true

      - name: Initialize west workspace
        run: |
          west init -l config/
          west update
          echo "✅ West initialized"

      - name: Export Zephyr
        working-directory: ./zmk
        run: |
          west zephyr-export
          echo "✅ Zephyr exported"

      - name: Build Left Half
        working-directory: ./zmk/app
        run: |
          echo "🔨 Building LEFT half..."
          west build -p always -b pro_micro_nrf52840 -- \
            -DSHIELD=corne_left \
            -DZMK_CONFIG="/workspace/config"
          
          # Check if build succeeded
          if [ -f "build/zephyr/zmk.uf2" ]; then
            echo "✅ Build successful!"
            mkdir -p /workspace/artifacts
            cp build/zephyr/zmk.uf2 /workspace/artifacts/corne_left_nice_nano.uf2
            ls -la /workspace/artifacts/
          else
            echo "❌ Build failed - firmware not found"
            exit 1
          fi

      - name: Upload left firmware
        uses: actions/upload-artifact@v4
        with:
          name: corne-left-firmware
          path: /workspace/artifacts/corne_left_nice_nano.uf2
          if-no-files-found: error

  build-right:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build Right Half

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config directory
        run: |
          mkdir -p config
          echo "📁 Config directory contents:"
          ls -la config/ || true

      - name: Initialize west workspace
        run: |
          west init -l config/
          west update
          echo "✅ West initialized"

      - name: Export Zephyr
        working-directory: ./zmk
        run: |
          west zephyr-export
          echo "✅ Zephyr exported"

      - name: Build Right Half
        working-directory: ./zmk/app
        run: |
          echo "🔨 Building RIGHT half..."
          west build -p always -b pro_micro_nrf52840 -- \
            -DSHIELD=corne_right \
            -DZMK_CONFIG="/workspace/config"
          
          # Check if build succeeded
          if [ -f "build/zephyr/zmk.uf2" ]; then
            echo "✅ Build successful!"
            mkdir -p /workspace/artifacts
            cp build/zephyr/zmk.uf2 /workspace/artifacts/corne_right_nice_nano.uf2
            ls -la /workspace/artifacts/
          else
            echo "❌ Build failed - firmware not found"
            exit 1
          fi

      - name: Upload right firmware
        uses: actions/upload-artifact@v4
        with:
          name: corne-right-firmware
          path: /workspace/artifacts/corne_right_nice_nano.uf2
          if-no-files-found: error
