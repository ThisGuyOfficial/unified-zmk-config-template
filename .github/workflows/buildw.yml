name: Build ZMK Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build Corne Keyboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize and update west
        run: |
          west init -l config
          west update

      - name: Build Corne Left
        run: |
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=corne_left -DZMK_CONFIG="/workspace/config"
          mkdir -p artifacts
          cp build/zephyr/zmk.uf2 artifacts/corne_left_nice_nano_v2.uf2
          rm -rf build

      - name: Build Corne Right
        run: |
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=corne_right -DZMK_CONFIG="/workspace/config"
          cp build/zephyr/zmk.uf2 artifacts/corne_right_nice_nano_v2.uf2

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: corne-firmware
          path: artifacts/
