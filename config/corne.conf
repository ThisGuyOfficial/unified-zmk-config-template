# SPDX-License-Identifier: MIT

# Core Bluetooth and Power Management
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_SLEEP=y

# CRITICAL FOR LINUX COMPATIBILITY
CONFIG_ZMK_HID_REPORT_TYPE_HID=y
CONFIG_BT_GATT_HIDS=y
CONFIG_BT_GATT_HIDS_REPORT_REF=y

# Battery Reporting
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60000

# USB Settings
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_VID=0x1d50
CONFIG_USB_PID=0x615e
CONFIG_ZMK_USB=y

# Split Keyboard Settings
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE_ROLE_CENTRAL_PERIPHERAL=y

# System Settings
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_MAIN_STACK_SIZE=4096

# HID Settings
CONFIG_ZMK_HID_KEYBOARD_REPORT_SIZE=8
CONFIG_ZMK_HID_CONSUMER_REPORT_SIZE=2

# Bluetooth Settings
CONFIG_BT_CTLR_DATA_LEN_MAX=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=251
CONFIG_BT_SMP=y
CONFIG_BT_SMP_SC_PAIR_ONLY=y
CONFIG_BT_FIXED_PASSKEY=123456

# Bootloader Settings
CONFIG_ZMK_BOOTLOADER_UF2=y
CONFIG_BOOTLOADER_MCUBOOT=y

# Disable unused features
CONFIG_BT_DEBUG_LOG=n
CONFIG_BT_SETTINGS=n
CONFIG_FLASH_MAP=n
CONFIG_STDOUT_CONSOLE=n
